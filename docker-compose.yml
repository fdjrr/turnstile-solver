services:
  turnstile-solver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turnstile-solver
    ports:
      - "5000:5000"
    volumes:
      # Persist logs
      - ./logs:/app/logs
    environment:
      # Optional: Add environment variables here
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    networks:
      - homelabs

networks:
  homelabs:
    external: true
